server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index fashion-pos.html;

    location / {
        try_files $uri $uri/ /fashion-pos.html;
    }

    # Cache static files
    location ~* \.(html|css|js|png|jpg|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
