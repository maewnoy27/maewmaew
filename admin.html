<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ข้อมูลผู้ตอบแบบสอบถาม</title>
  <style>
    :root[data-theme="light"] {
      --bg: #fdf2f8;
      --card: #fff5f9;
      --text: #4a1942;
      --subtext: #9b5a7e;
      --label: #6b2d5e;
      --border: #f0c2df;
      --th-bg: #fce7f3;
      --tr-hover: #fdf2f8;
      --badge-bg: #fce7f3;
      --badge-text: #be185d;
      --btn-danger: #fc8181;
      --btn-danger-hover: #f56565;
      --btn-export: #f472b6;
      --btn-export-hover: #e879a8;
      --toggle-bg: #fce7f3;
      --empty-text: #f9a8d4;
      --input-bg: #fff5f9;
      --input-text: #4a1942;
      --input-border: #f0c2df;
      --input-focus: #e879a8;
      --tag-bg: #fce7f3;
      --tag-text: #be185d;
      --back-link: #e879a8;
      --modal-overlay: rgba(74,25,66,0.4);
    }
    :root[data-theme="dark"] {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --subtext: #94a3b8;
      --label: #e2e8f0;
      --border: #334155;
      --th-bg: #0f172a;
      --tr-hover: #263347;
      --badge-bg: #1e3a5f;
      --badge-text: #93c5fd;
      --btn-danger: #ef4444;
      --btn-danger-hover: #dc2626;
      --btn-export: #22c55e;
      --btn-export-hover: #16a34a;
      --toggle-bg: #334155;
      --empty-text: #475569;
      --input-bg: #0f172a;
      --input-text: #f1f5f9;
      --input-border: #334155;
      --input-focus: #60a5fa;
      --tag-bg: #1e3a5f;
      --tag-text: #93c5fd;
      --back-link: #60a5fa;
      --modal-overlay: rgba(0,0,0,0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 32px 20px;
      transition: background 0.3s;
      color: var(--text);
    }

    .container { max-width: 960px; margin: 0 auto; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left h1 { font-size: 1.6rem; color: var(--text); }
    .header-left p  { font-size: 0.875rem; color: var(--subtext); margin-top: 4px; }

    .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .theme-toggle {
      background: var(--toggle-bg);
      border: none;
      border-radius: 50px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.3s;
    }
    .theme-toggle:hover { opacity: 0.8; }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      color: #fff;
    }
    .btn-export { background: var(--btn-export); }
    .btn-export:hover { background: var(--btn-export-hover); }
    .btn-danger { background: var(--btn-danger); }
    .btn-danger:hover { background: var(--btn-danger-hover); }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 9px 14px;
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--input-bg);
      color: var(--input-text);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--input-focus); }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--card);
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      min-width: 120px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: var(--badge-text); }
    .stat-card .lbl { font-size: 0.8rem; color: var(--subtext); margin-top: 2px; }

    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: var(--th-bg);
      color: var(--subtext);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--tr-hover); }

    td { padding: 13px 16px; font-size: 0.9rem; color: var(--text); vertical-align: middle; }

    .badge {
      display: inline-block;
      background: var(--badge-bg);
      color: var(--badge-text);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .stars-lit   { color: #fbbf24; letter-spacing: 1px; }
    .stars-empty { color: #d1d5db; letter-spacing: 1px; }

    .sub-info { font-size: 0.78rem; color: var(--subtext); margin-top: 2px; }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      opacity: 0.45;
      transition: opacity 0.2s;
      padding: 4px 6px;
    }
    .del-btn:hover { opacity: 1; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--empty-text);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.95rem; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--back-link);
      text-decoration: none;
      font-size: 0.875rem;
      margin-top: 20px;
    }
    .back-link:hover { text-decoration: underline; }

    /* ===== Detail Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--card);
      border-radius: 14px;
      padding: 28px 30px;
      max-width: 460px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      transform: translateY(16px);
      transition: transform 0.22s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--subtext);
      line-height: 1;
      padding: 4px;
    }
    .modal-close:hover { color: var(--text); }

    .modal-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      padding-right: 28px;
    }

    .detail-grid { display: grid; gap: 11px; }

    .detail-row { display: flex; gap: 12px; align-items: flex-start; }

    .detail-lbl {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--subtext);
      min-width: 90px;
      padding-top: 1px;
      flex-shrink: 0;
    }

    .detail-val {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.5;
    }

    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.78rem;
      font-weight: 600;
      margin: 2px 2px 2px 0;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }

    @media (max-width: 600px) {
      thead th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1>🔧 Admin Dashboard</h1>
        <p>ข้อมูลผู้ตอบแบบสอบถามทั้งหมด</p>
      </div>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()">
          <span id="themeIcon">🌙</span>
          <span id="themeLabel">โทนมืด</span>
        </button>
        <button class="btn btn-export" onclick="exportCSV()">⬇️ Export CSV</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑️ ลบทั้งหมด</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="num" id="totalCount">0</div>
        <div class="lbl">รายการทั้งหมด</div>
      </div>
      <div class="stat-card">
        <div class="num" id="todayCount">0</div>
        <div class="lbl">วันนี้</div>
      </div>
      <div class="stat-card">
        <div class="num" id="avgRating">—</div>
        <div class="lbl">คะแนนเฉลี่ย (/ 5)</div>
      </div>
    </div>

    <div class="toolbar">
      <input class="search-box" id="searchBox" type="text"
        placeholder="🔍 ค้นหาชื่อ อีเมล์ หรือเบอร์โทร..." oninput="renderTable()">
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>ชื่อ-นามสกุล</th>
            <th>อีเมล์</th>
            <th>ความพึงพอใจ</th>
            <th>วันที่</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none;">
        <div class="icon">📭</div>
        <p>ยังไม่มีข้อมูล</p>
      </div>
    </div>

    <a href="form.html" class="back-link">← กลับไปหน้าแบบสอบถาม</a>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-name" id="modalName"></div>
      <div class="detail-grid" id="modalBody"></div>
    </div>
  </div>

  <script>
    // Theme
    const saved = localStorage.getItem('theme') || 'light';
    setTheme(saved);

    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      document.getElementById('themeIcon').textContent = t === 'dark' ? '☀️' : '🌙';
      document.getElementById('themeLabel').textContent = t === 'dark' ? 'โทนสว่าง' : 'โทนมืด';
    }
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      setTheme(cur === 'dark' ? 'light' : 'dark');
    }

    function getList() {
      return JSON.parse(localStorage.getItem('submissions') || '[]');
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function starHTML(n) {
      n = parseInt(n) || 0;
      return `<span class="stars-lit">${'★'.repeat(n)}</span><span class="stars-empty">${'★'.repeat(5 - n)}</span>`;
    }

    function renderTable() {
      const q    = document.getElementById('searchBox').value.toLowerCase();
      const all  = getList();
      const list = all.filter(r =>
        r.name.toLowerCase().includes(q) ||
        r.email.toLowerCase().includes(q) ||
        (r.phone || '').includes(q)
      );

      const today     = new Date().toLocaleDateString('th-TH');
      const todayCount = all.filter(r => r.date && r.date.startsWith(today)).length;
      const rated      = all.filter(r => r.rating > 0);
      const avg        = rated.length
        ? (rated.reduce((s, r) => s + r.rating, 0) / rated.length).toFixed(1)
        : '—';

      document.getElementById('totalCount').textContent = all.length;
      document.getElementById('todayCount').textContent = todayCount;
      document.getElementById('avgRating').textContent  = avg;

      const tbody = document.getElementById('tableBody');
      const empty = document.getElementById('emptyState');

      if (list.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = list.map((r, i) => `
        <tr onclick="openDetail(${r.id})">
          <td><span class="badge">${i + 1}</span></td>
          <td>
            <strong>${esc(r.name)}</strong>
            ${r.gender ? `<div class="sub-info">${esc(r.gender)}${r.age ? ' · ' + esc(r.age) : ''}</div>` : ''}
          </td>
          <td>${esc(r.email)}</td>
          <td>${r.rating ? starHTML(r.rating) : '<span style="color:var(--subtext)">—</span>'}</td>
          <td style="color:var(--subtext);font-size:0.8rem">${esc(r.date)}</td>
          <td><button class="del-btn" title="ลบ"
            onclick="event.stopPropagation(); deleteRow(${r.id})">🗑️</button></td>
        </tr>
      `).join('');
    }

    function deleteRow(id) {
      if (!confirm('ลบรายการนี้?')) return;
      const list = getList().filter(r => r.id !== id);
      localStorage.setItem('submissions', JSON.stringify(list));
      renderTable();
    }

    function clearAll() {
      if (!confirm('ยืนยันลบข้อมูลทั้งหมด?')) return;
      localStorage.removeItem('submissions');
      renderTable();
    }

    function exportCSV() {
      const list = getList();
      if (!list.length) { alert('ไม่มีข้อมูล'); return; }
      const header = 'ชื่อ-นามสกุล,อีเมล์,เบอร์โทร,ช่วงอายุ,เพศ,อาชีพ,ความพึงพอใจ,ช่องทาง,ข้อเสนอแนะ,วันที่';
      const rows = list.map(r => [
        `"${r.name}"`,
        `"${r.email}"`,
        `"${r.phone}"`,
        `"${r.age || ''}"`,
        `"${r.gender || ''}"`,
        `"${r.occupation || ''}"`,
        r.rating || '',
        `"${(r.sources || []).join(', ')}"`,
        `"${(r.comments || '').replace(/"/g, '""')}"`,
        `"${r.date}"`
      ].join(','));
      const csv  = '﻿' + [header, ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = 'submissions.csv';
      a.click();
    }

    // Modal
    function openDetail(id) {
      const r = getList().find(x => x.id === id);
      if (!r) return;

      document.getElementById('modalName').textContent = r.name;

      const sources = (r.sources || []).map(s => `<span class="tag">${esc(s)}</span>`).join('') || '—';
      const ratingLabels = ['', 'แย่มาก', 'พอใช้', 'ปานกลาง', 'ดี', 'ดีมาก'];

      document.getElementById('modalBody').innerHTML = `
        <div class="detail-row">
          <span class="detail-lbl">อีเมล์</span>
          <span class="detail-val">${esc(r.email)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">เบอร์โทร</span>
          <span class="detail-val">${esc(r.phone)}</span>
        </div>
        <hr class="divider">
        <div class="detail-row">
          <span class="detail-lbl">ช่วงอายุ</span>
          <span class="detail-val">${esc(r.age || '—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">เพศ</span>
          <span class="detail-val">${esc(r.gender || '—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">อาชีพ</span>
          <span class="detail-val">${esc(r.occupation || '—')}</span>
        </div>
        <hr class="divider">
        <div class="detail-row">
          <span class="detail-lbl">พึงพอใจ</span>
          <span class="detail-val">
            ${r.rating ? starHTML(r.rating) + ` <small style="color:var(--subtext)">(${r.rating}/5 — ${ratingLabels[r.rating]})</small>` : '—'}
          </span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">ช่องทาง</span>
          <span class="detail-val">${sources}</span>
        </div>
        ${r.comments ? `
        <div class="detail-row">
          <span class="detail-lbl">ความคิดเห็น</span>
          <span class="detail-val">${esc(r.comments)}</span>
        </div>` : ''}
        <hr class="divider">
        <div class="detail-row">
          <span class="detail-lbl">วันที่</span>
          <span class="detail-val" style="color:var(--subtext)">${esc(r.date)}</span>
        </div>
      `;

      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    renderTable();
  </script>
</body>
</html>
